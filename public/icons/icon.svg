<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="dome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ecfdf5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Mosque Dome -->
  <g transform="translate(256, 260)">
    <!-- Base -->
    <rect x="-120" y="40" width="240" height="80" rx="8" fill="white" opacity="0.95"/>
    <!-- Pillars -->
    <rect x="-100" y="-20" width="24" height="64" rx="4" fill="white" opacity="0.9"/>
    <rect x="-12" y="-20" width="24" height="64" rx="4" fill="white" opacity="0.9"/>
    <rect x="76" y="-20" width="24" height="64" rx="4" fill="white" opacity="0.9"/>
    <!-- Main Dome -->
    <ellipse cx="0" cy="-20" rx="100" ry="70" fill="url(#dome)" opacity="0.95"/>
    <!-- Small Dome Left -->
    <ellipse cx="-70" cy="10" rx="35" ry="30" fill="white" opacity="0.85"/>
    <!-- Small Dome Right -->
    <ellipse cx="70" cy="10" rx="35" ry="30" fill="white" opacity="0.85"/>
    <!-- Crescent -->
    <g transform="translate(0, -100)">
      <circle cx="0" cy="0" r="14" fill="#FCD34D"/>
      <circle cx="5" cy="-3" r="11" fill="url(#bg)"/>
      <!-- Pole -->
      <rect x="-2" y="8" width="4" height="16" rx="2" fill="#FCD34D"/>
    </g>
    <!-- Checkmark Badge -->
    <g transform="translate(80, -60)">
      <circle cx="0" cy="0" r="28" fill="#FCD34D"/>
      <polyline points="-10,2 -3,10 12,-6" stroke="#059669" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>
  <!-- App Name -->
  <text x="256" y="410" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="42" fill="white" letter-spacing="1">KAJIAN</text>
  <text x="256" y="450" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="28" fill="rgba(255,255,255,0.8)" letter-spacing="3">WALSAN</text>
</svg>
