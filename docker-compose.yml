version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    env_file:
      - .env
    volumes:
      - storage_data:/var/www/html/storage/app
    restart: unless-stopped
    networks:
      - kajian-network

networks:
  kajian-network:
    driver: bridge

volumes:
  storage_data:
