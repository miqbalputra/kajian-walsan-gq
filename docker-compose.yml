services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - OCTANE_SERVER=frankenphp
    env_file:
      - .env
    volumes:
      - storage_data:/app/storage/app
    restart: unless-stopped
    networks:
      - kajian-network

# ============================================================
# Redis dijalankan SEKALI sebagai resource Coolify terpisah dan
# dipakai bersama aplikasi lain (lihat .env.example bagian REDIS).
# Karena itu TIDAK ada service redis di sini — aplikasi terhubung
# ke Redis eksternal via REDIS_HOST / REDIS_PASSWORD / REDIS_DB.
# Pastikan container app dan Redis berada di network Coolify yang
# sama (atau pakai hostname yang Coolify sediakan untuk Redis tsb).
# ============================================================

networks:
  kajian-network:
    driver: bridge

volumes:
  storage_data: