; ============================================================
; PHP-FPM pool tuning untuk VPS 4GB / 2 vCPU
; ============================================================
; Default image hanya menyediakan pm.max_children = 5, yang
; membuat hanya 5 request konkuren yang bisa dilayani — penyebab
; utama loading lama ketika user mencapai ratusan.
;
; Konfigurasi ini menaikkan kapasitas worker, memakai pm.max_requests
; untuk mencegah memory leak, dan menurunkan potensi pemakaian RAM
; per worker agar muat di VPS 4GB bersama nginx + queue + pulse.
; ============================================================

[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000
listen.owner = www-data
listen.group = www-data

; pm = dynamic: jumlah worker naik-turun sesuai beban
pm = dynamic
pm.max_children = 20        ; maks 20 worker konkuren (cukup untuk ~400 user)
pm.start_servers = 4         ; worker langsung hidup saat start
pm.min_spare_servers = 2    ; minimal worker idle siap pakai
pm.max_spare_servers = 8    ; maksimal worker idle sebelum dibebaskan

; Recycle worker setelah 500 request agar memori tidak membengkak
; akibat potensi memory leak di dependency pihak ketiga.
pm.max_requests = 500

; Status page (akses hanya dari dalam container/network, bukan publik)
pm.status_path = /status
ping.path = /ping

; Log per-request lambat (opsional, bantu diagnosa Coolify/Pulse)
; access.log = /proc/self/fd/2
; slowlog = /proc/self/fd/2
; request_slowlog_timeout = 5s