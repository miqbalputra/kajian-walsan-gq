; ============================================================
; PHP configuration untuk FrankenPHP + Octane
; ============================================================
; Octane keeps Laravel bootstrapped in memory, jadi OPcache
; sangat penting untuk performance class loading.
; ============================================================

; Upload file settings
upload_max_filesize = 10M
post_max_size = 12M
max_execution_time = 120
max_input_time = 120

; Memory limit — Octane worker butuh lebih banyak memory
; karena app tetap di memory. 256M adalah cap (safety), bukan
; alokasi. Dengan 2 worker × 256M = maks 512MB, aman di VPS 4GB
; bersama queue worker + Redis (eksternal).
memory_limit = 256M

; Temp directory untuk upload
upload_tmp_dir = /tmp

; Session
session.gc_maxlifetime = 7200

; ============================================================
; OPcache — sangat krusial untuk Octane performance
; ============================================================
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000
opcache.max_wasted_percentage = 10
; Di production (Docker), jangan cek perubahan file — immutable image
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.save_comments = 1
; Preload tidak digunakan karena Octane sudah bootstrap app di memory