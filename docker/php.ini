; PHP configuration untuk production
; Upload file settings
upload_max_filesize = 10M
post_max_size = 12M
max_execution_time = 120
max_input_time = 120
; memory_limit diturunkan dari 256M ke 128M.
; 256M adalah CAP (safety), bukan alokasi — request Laravel normal
; hanya ~20-40MB. Dengan 20 worker × 128M cap = maks 2.5GB, masih
; aman di VPS 4GB bersama nginx + queue worker + pulse + Redis.
memory_limit = 128M

; Temp directory untuk upload (gunakan direktori yang writable)
upload_tmp_dir = /tmp

; Session
session.gc_maxlifetime = 7200
