services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    env_file:
      - .env
    volumes:
      - storage_data:/var/www/html/storage/app
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - kajian-network

  redis:
    # Penyimpanan cepat untuk session, cache (rate limiter, Livewire),
    # antrian job, dan cache Pulse. Mengurangi puluhan query DB per request.
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - kajian-network
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    # (Opsional) persistensi ringan kalau ingin job antri tetap ada setelah restart:
    # volumes:
    #   - redis_data:/data

networks:
  kajian-network:
    driver: bridge

volumes:
  storage_data:
  # redis_data: